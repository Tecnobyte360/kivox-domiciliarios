name: kivox_domiciliarios
description: Kivox Repartidores ??? app para domiciliarios (iniciar/finalizar ruta, c??digo de entrega, GPS).
publish_to: 'none'
version: 1.6.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  geolocator: ^11.0.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.6
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# ??cono de la app = logo Kivox (solo Android: el APK no compila iOS)
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

