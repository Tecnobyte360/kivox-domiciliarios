name: Build APK Kivox Repartidores

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generar plataforma Android
        run: flutter create --platforms=android --project-name kivox_domiciliarios .

      - name: Permisos (Internet + ubicación + cámara + notificaciones)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <application|' "$MF"
          echo "----- Manifest -----"; cat "$MF"

      - name: Configurar Firebase (applicationId + plugin google-services)
        run: |
          # 1) applicationId debe coincidir con el package_name de google-services.json
          if [ -f android/app/build.gradle.kts ]; then
            APP=android/app/build.gradle.kts
            sed -i 's/applicationId = "com.example.kivox_domiciliarios"/applicationId = "co.kivox.repartidores"/' "$APP"
            sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services")' "$APP"
          else
            APP=android/app/build.gradle
            sed -i 's/applicationId "com.example.kivox_domiciliarios"/applicationId "co.kivox.repartidores"/' "$APP"
            sed -i '/apply plugin: .com.android.application./a apply plugin: '\''com.google.gms.google-services'\''' "$APP"
          fi
          # 2) Plugin google-services a nivel de proyecto
          if [ -f android/settings.gradle.kts ]; then
            sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.4.2" apply false' android/settings.gradle.kts
          fi
          # 3) Copiar google-services.json al módulo app
          cp google-services.json android/app/google-services.json
          echo "----- app build.gradle(.kts) -----"; cat "$APP"

      - name: Firma de lanzamiento (upload key) para Play Store
        run: |
          set -e
          cp keystore/upload-keystore.jks android/app/upload-keystore.jks
          cat > android/key.properties <<'EOF'
          storePassword=KivoxUpload2026
          keyPassword=KivoxUpload2026
          keyAlias=upload
          storeFile=upload-keystore.jks
          EOF
          APP=android/app/build.gradle.kts
          if [ -f "$APP" ]; then
            sed -i '1i import java.util.Properties' "$APP"
            sed -i '1i import java.io.FileInputStream' "$APP"
            sed -i 's|^android {|val keystoreProperties = Properties()\nval keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) {\n    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n}\n\nandroid {|' "$APP"
            sed -i 's|buildTypes {|signingConfigs {\n        create("release") {\n            keyAlias = keystoreProperties["keyAlias"] as String\n            keyPassword = keystoreProperties["keyPassword"] as String\n            storeFile = file(keystoreProperties["storeFile"] as String)\n            storePassword = keystoreProperties["storePassword"] as String\n        }\n    }\n\n    buildTypes {|' "$APP"
            sed -i 's|signingConfigs.getByName("debug")|signingConfigs.getByName("release")|' "$APP"
          else
            APP=android/app/build.gradle
            sed -i '1i def keystoreProperties = new Properties()\ndef keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }' "$APP"
            sed -i 's|buildTypes {|signingConfigs {\n        release {\n            keyAlias keystoreProperties["keyAlias"]\n            keyPassword keystoreProperties["keyPassword"]\n            storeFile file(keystoreProperties["storeFile"])\n            storePassword keystoreProperties["storePassword"]\n        }\n    }\n\n    buildTypes {|' "$APP"
            sed -i 's|signingConfig signingConfigs.debug|signingConfig signingConfigs.release|' "$APP"
          fi
          echo "----- build.gradle FIRMADO -----"; cat "$APP"

      - name: Dependencias
        run: flutter pub get

      - name: Generar ícono de la app (logo Kivox)
        run: dart run flutter_launcher_icons:main || flutter pub run flutter_launcher_icons

      - name: Compilar APK (release)
        run: flutter build apk --release

      - name: Compilar App Bundle .aab (release) — para Play Store
        run: flutter build appbundle --release

      - name: Subir APK + AAB como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: kivox-domiciliarios-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Publicar APK + AAB en un Release (descarga fácil)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Kivox Repartidores (build ${{ github.run_number }})
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
