name: Build APK Kivox Repartidores

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generar plataforma Android
        run: flutter create --platforms=android --project-name kivox_domiciliarios .

      - name: Permisos (Internet + ubicación + cámara + notificaciones)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <application|' "$MF"
          echo "----- Manifest -----"; cat "$MF"

      - name: Configurar Firebase (applicationId + plugin google-services)
        run: |
          # 1) applicationId debe coincidir con el package_name de google-services.json
          if [ -f android/app/build.gradle.kts ]; then
            APP=android/app/build.gradle.kts
            sed -i 's/applicationId = "com.example.kivox_domiciliarios"/applicationId = "co.kivox.repartidores"/' "$APP"
            sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services")' "$APP"
          else
            APP=android/app/build.gradle
            sed -i 's/applicationId "com.example.kivox_domiciliarios"/applicationId "co.kivox.repartidores"/' "$APP"
            sed -i '/apply plugin: .com.android.application./a apply plugin: '\''com.google.gms.google-services'\''' "$APP"
          fi
          # 2) Plugin google-services a nivel de proyecto
          if [ -f android/settings.gradle.kts ]; then
            sed -i '/id("com.android.application")/a\    id("com.google.gms.google-services") version "4.4.2" apply false' android/settings.gradle.kts
          fi
          # 3) Copiar google-services.json al módulo app
          cp google-services.json android/app/google-services.json
          echo "----- app build.gradle(.kts) -----"; cat "$APP"

      - name: Dependencias
        run: flutter pub get

      - name: Generar ícono de la app (logo Kivox)
        run: dart run flutter_launcher_icons:main || flutter pub run flutter_launcher_icons

      - name: Compilar APK (release)
        run: flutter build apk --release

      - name: Compilar App Bundle .aab (release) — para Play Store
        run: flutter build appbundle --release

      - name: Subir APK + AAB como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: kivox-domiciliarios-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

      - name: Publicar APK + AAB en un Release (descarga fácil)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Kivox Repartidores (build ${{ github.run_number }})
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
